# 此文件由 gpg-unlock 自动生成，仅供参考，请勿直接使用。
# 复制为 config.toml 并按需修改：
#   Linux/macOS: ~/.config/gpg-unlock/config.toml
#   Windows:     %APPDATA%\gpg-unlock\config.toml

backend = "bitwarden"

[backends.bitwarden]
# Bitwarden CLI 命令，支持生物认证可改为 bwbio
# command = "bw"
# Bitwarden 中存储 GPG 密码短语的项目名称
item_name = "GPG"
# 项目中存储密码短语的自定义字段名
field_name = "passphrase"

[backends.infisical]
# Infisical CLI 命令（与 docker_image 二选一）
# command = "infisical"
# 设置后用 docker run <image> 代替本地 infisical 命令
# docker_image = "infisical/cli:latest"
# Secret 名称
secret_name = "GPG_PASSPHRASE"
# 含 .infisical.json 的项目目录（与 project_id 二选一）
# project_dir = "/path/to/project"
# 项目 ID（与 project_dir 二选一）
# project_id = "fcxxxxx-xxxx-xxxx-xxxx-xxxxxxxx"
# 环境，如 dev/staging/prod
# environment = "dev"
# Secret 路径
# secret_path = "/"
# Infisical 实例域名
# domain = "https://app.infisical.com"
# Access Token，用于 CI/CD
# token = ""
