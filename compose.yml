services:
  dev:
    image: golang:1.24
    working_dir: /src
    volumes:
      - .:/src
    command: ["sleep", "infinity"]

  build:
    image: golang:1.24
    working_dir: /src
    volumes:
      - .:/src
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        mkdir -p dist
        echo "Building linux/amd64..."
        CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -o dist/gpg-unlock-linux-amd64 .
        echo "Building darwin/amd64..."
        CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -o dist/gpg-unlock-darwin-amd64 .
        echo "Building darwin/arm64..."
        CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -o dist/gpg-unlock-darwin-arm64 .
        echo "Building windows/amd64..."
        CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o dist/gpg-unlock-windows-amd64.exe .
        echo "Done! Binaries in dist/"
        ls -lh dist/
